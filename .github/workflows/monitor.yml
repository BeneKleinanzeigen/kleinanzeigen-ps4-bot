name: PS4 Kleinanzeigen Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          KLAZ_API_KEY: ${{ secrets.KLAZ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_RAW: ${{ secrets.TELEGRAM_CHAT_ID_RAW }}
          TELEGRAM_CHAT_ID_FILTERED: ${{ secrets.TELEGRAM_CHAT_ID_FILTERED }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py

      - name: Statusdatei zurueck ins Repo committen
        run: |
          git config user.name "kleinanzeigen-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "State-Update"
          git push
